<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>LabX - Research Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              labBg: "#0D0D0D",
              labAccent: "#BBF7D0",
              labRed: "#FF6B6B",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0d0d0d;
        color: #e5e5e5;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* 確保鍵盤彈出時，內容區縮放但不吃掉底部 */
      main {
        flex: 1;
        overflow-y: auto;
      }
    </style>
  </head>
  <body class="h-screen flex flex-col overflow-hidden">
    <header
      class="flex justify-between items-center px-4 py-3 border-b border-white/5 flex-none bg-labBg"
    >
      <h1 class="text-xs font-black tracking-widest text-labAccent uppercase">
        LabX.
      </h1>
      <button
        onclick="toggleView()"
        class="text-[10px] text-gray-500 hover:text-white uppercase tracking-tighter"
      >
        <span id="view-label">Past</span>
      </button>
    </header>

    <main id="main-content" class="no-scrollbar">
      <section id="editor-view" class="h-full flex flex-col">
        <textarea
          id="editor"
          class="w-full h-full bg-transparent p-5 text-[15px] leading-relaxed outline-none resize-none placeholder:text-gray-800"
          placeholder="Record..."
        ></textarea>
      </section>

      <section id="history-view" class="hidden p-5">
        <h2 class="text-xs text-gray-600 mb-4 uppercase tracking-widest">
          History Log
        </h2>
        <div id="log-list" class="space-y-4 text-xs font-mono"></div>
      </section>
    </main>

    <footer
      class="p-2 bg-black/40 border-t border-white/5 flex items-center justify-around gap-2 flex-none"
    >
      <button
        onclick="handleAction('time')"
        class="text-[11px] py-2 px-3 text-gray-400 active:text-labAccent"
      >
        time
      </button>
      <button
        onclick="handleAction('line')"
        class="text-[11px] py-2 px-3 text-gray-400 active:text-labAccent"
      >
        line
      </button>
      <button
        onclick="handleAction('save')"
        class="text-[11px] py-2 px-4 bg-white/5 rounded-full text-labAccent"
      >
        Save Log
      </button>
      <button
        onclick="handleAction('clear')"
        class="text-[11px] py-2 px-3 text-labRed/60"
      >
        clear
      </button>
    </footer>

    <script>
      const editor = document.getElementById("editor");
      const editorView = document.getElementById("editor-view");
      const historyView = document.getElementById("history-view");
      const viewLabel = document.getElementById("view-label");
      const logList = document.getElementById("log-list");

      // 初始化資料：改為陣列結構
      let logs = JSON.parse(localStorage.getItem("lab_logs") || "[]");

      // 切換視圖 (Past / Editor)
      function toggleView() {
        if (editorView.classList.contains("hidden")) {
          editorView.classList.remove("hidden");
          historyView.classList.add("hidden");
          viewLabel.innerText = "Past";
        } else {
          renderLogs();
          editorView.classList.add("hidden");
          historyView.classList.remove("hidden");
          viewLabel.innerText = "Back";
        }
      }

      // 渲染歷史紀錄
      function renderLogs() {
        logList.innerHTML =
          logs.length === 0
            ? '<div class="text-gray-800">No logs found.</div>'
            : "";
        logs
          .slice()
          .reverse()
          .forEach((log, index) => {
            const item = document.createElement("div");
            item.className = "pb-4 border-b border-white/5";
            item.innerHTML = `
                    <div class="text-[9px] text-labAccent mb-1 opacity-50">${log.date}</div>
                    <div class="whitespace-pre-wrap leading-relaxed">${log.content}</div>
                `;
            logList.appendChild(item);
          });
      }

      // 統一動作處理
      function handleAction(type) {
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}] `;

        switch (type) {
          case "time":
            editor.setRangeText(
              timeStr,
              editor.selectionStart,
              editor.selectionEnd,
              "end",
            );
            break;
          case "line":
            editor.setRangeText(
              "\n---\n",
              editor.selectionStart,
              editor.selectionEnd,
              "end",
            );
            break;
          case "save":
            if (!editor.value.trim()) return;
            const newLog = {
              date: now.toLocaleString(),
              content: editor.value,
            };
            logs.push(newLog);
            localStorage.setItem("lab_logs", JSON.stringify(logs));
            editor.value = "";
            alert("Log Saved!");
            break;
          case "clear":
            if (confirm("Clear current draft?")) editor.value = "";
            break;
        }
        editor.focus();
      }
    </script>
  </body>
</html>
