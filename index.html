<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>LabX - Top Toolbar Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              labBg: "#0D0D0D",
              labAccent: "#BBF7D0",
              labRed: "#FF6B6B",
            },
          },
        },
      };
    </script>
    <style>
      /* 確保輸入時不會被縮放 */
      textarea {
        font-size: 16px !important;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* 讓內容區自動填滿剩餘高度 */
      .viewport-height {
        height: calc(100vh - 100px);
      }
    </style>
  </head>
  <body class="bg-labBg text-gray-200 overflow-hidden flex flex-col h-screen">
    <header class="flex-none bg-labBg z-30">
      <div
        class="flex justify-between items-center px-4 py-3 border-b border-white/5"
      >
        <h1 class="text-xs font-black tracking-widest text-labAccent uppercase">
          LabX.
        </h1>
        <button
          onclick="toggleView()"
          class="text-[10px] text-gray-500 uppercase font-bold"
          id="view-btn"
        >
          Past
        </button>
      </div>

      <div
        class="flex items-center justify-between px-2 py-2 bg-white/5 border-b border-white/5 gap-1"
      >
        <div class="flex">
          <button
            onclick="handleAction('time')"
            class="px-3 py-2 text-[11px] text-gray-400 active:text-labAccent font-mono"
          >
            time
          </button>
          <button
            onclick="handleAction('line')"
            class="px-3 py-2 text-[11px] text-gray-400 active:text-labAccent font-mono"
          >
            line
          </button>
        </div>
        <div class="flex items-center gap-2">
          <button
            onclick="handleAction('save')"
            class="bg-labAccent text-black text-[10px] font-black px-4 py-2 rounded-md active:opacity-70"
          >
            SAVE LOG
          </button>
          <button
            onclick="handleAction('clear')"
            class="px-3 py-2 text-[10px] text-labRed/50 uppercase font-bold"
          >
            Clear
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar relative">
      <div id="editor-view" class="h-full">
        <textarea
          id="editor"
          class="w-full h-full bg-transparent p-5 leading-relaxed outline-none resize-none placeholder:text-gray-800"
          placeholder="Start recording..."
        ></textarea>
      </div>

      <div id="history-view" class="hidden p-5">
        <h2
          class="text-[10px] text-gray-600 mb-6 uppercase tracking-widest font-bold"
        >
          History Archive
        </h2>
        <div id="log-list" class="space-y-6"></div>
      </div>
    </main>

    <script>
      const editor = document.getElementById("editor");
      const editorView = document.getElementById("editor-view");
      const historyView = document.getElementById("history-view");
      const viewBtn = document.getElementById("view-btn");
      const logList = document.getElementById("log-list");

      // 使用不同的 Key 以免資料衝突
      let logs = JSON.parse(localStorage.getItem("lab_logs_v3") || "[]");

      function toggleView() {
        const isHistory = editorView.classList.contains("hidden");
        if (isHistory) {
          editorView.classList.remove("hidden");
          historyView.classList.add("hidden");
          viewBtn.innerText = "Past";
        } else {
          renderLogs();
          editorView.classList.add("hidden");
          historyView.classList.remove("hidden");
          viewBtn.innerText = "Back";
        }
      }

      function renderLogs() {
        logList.innerHTML =
          logs.length === 0
            ? '<div class="text-gray-800 text-xs text-center mt-10">Archive is empty.</div>'
            : "";
        logs
          .slice()
          .reverse()
          .forEach((log) => {
            const div = document.createElement("div");
            div.className = "border-l border-white/10 pl-4 py-1";
            div.innerHTML = `
                    <div class="text-[9px] text-labAccent/40 font-mono mb-2 uppercase">${log.date}</div>
                    <div class="text-sm text-gray-400 leading-relaxed">${log.content.replace(/\n/g, "<br>")}</div>
                `;
            logList.appendChild(div);
          });
      }

      function handleAction(type) {
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}] `;

        if (type === "save") {
          if (!editor.value.trim()) return;
          logs.push({
            date: now.toLocaleString("zh-TW", { hour12: false }),
            content: editor.value,
          });
          localStorage.setItem("lab_logs_v3", JSON.stringify(logs));
          editor.value = "";
          alert("Saved to Archive");
        } else if (type === "clear") {
          if (confirm("Clear Draft?")) editor.value = "";
        } else if (type === "time") {
          insertAtCursor(timeStr);
        } else if (type === "line") {
          insertAtCursor("\n---\n");
        }
      }

      function insertAtCursor(text) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value =
          editor.value.substring(0, start) + text + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + text.length;
        editor.focus();
      }
    </script>
  </body>
</html>
