<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Lab - UX Research</title>
    <style>
      :root {
        --bg-color: rgba(13, 13, 13, 0.9);
        --accent-color: #bbf7d0; /* 你專屬的實驗室螢光綠 */
        --text-color: #e5e5e5;
        --secondary-text: #888;
        --spacing: 16px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* 標題列：極簡設計感 */
      header {
        padding: 12px var(--spacing);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #333;
      }

      header h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2px;
        margin: 0;
        color: var(--accent-color);
        text-transform: uppercase;
      }

      /* 筆記區域：重點在於大字體與無邊框 */
      #editor {
        flex: 1;
        width: 100%;
        padding: var(--spacing);
        background: transparent;
        border: none;
        color: var(--text-color);
        font-size: 16px;
        line-height: 1.6;
        resize: none;
        outline: none;
        font-family: inherit;
      }

      /* 底部工具欄 */
      footer {
        padding: 8px var(--spacing);
        background: rgba(26, 26, 26, 0.5);
        display: flex;
        gap: 8px;
        border-top: 1px solid #333;
      }

      button {
        background: #222;
        border: 1px solid #444;
        color: var(--text-color);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      button:active {
        background: var(--accent-color);
        color: #000;
      }

      .status {
        font-size: 10px;
        color: var(--secondary-text);
        margin-left: auto;
        align-self: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Lab.</h1>
      <div class="status" id="save-status">Synced</div>
    </header>

    <textarea id="editor" placeholder="在此記錄第一手 UX 觀察..."></textarea>

    <footer>
      <button onclick="insertTime()">+ Time</button>
      <button onclick="insertDivider()">———</button>
      <button onclick="clearAll()" style="color: #ff6b6b">Clear</button>
    </footer>

    <script>
      const editor = document.getElementById("editor");
      const status = document.getElementById("save-status");

      // 載入舊有的實驗數據
      editor.value = localStorage.getItem("lab_notes") || "";

      // 自動存檔：每打一個字都存入 localStorage
      editor.addEventListener("input", () => {
        localStorage.setItem("lab_notes", editor.value);
        status.innerText = "Saving...";
        setTimeout(() => (status.innerText = "Synced"), 500);
      });

      // 插入當下時間（你的 UX Log 習慣）
      function insertTime() {
        const now = new Date();
        const timeStr = `\n[${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}] `;
        editor.setRangeText(
          timeStr,
          editor.selectionStart,
          editor.selectionEnd,
          "end",
        );
        editor.focus();
        localStorage.setItem("lab_notes", editor.value);
      }

      function insertDivider() {
        editor.setRangeText(
          "\n---\n",
          editor.selectionStart,
          editor.selectionEnd,
          "end",
        );
        editor.focus();
      }

      function clearAll() {
        if (confirm("確定要清空實驗室紀錄嗎？")) {
          editor.value = "";
          localStorage.setItem("lab_notes", "");
        }
      }
    </script>
  </body>
</html>
