<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Lab - UX Research</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      /* 1. DESIGN TOKENS (管理中心) */
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                bg: "#0D0D0D",
                surface: "#1A1A1A",
                accent: "#BBF7D0",
              },
            },
            spacing: {
              "safe-bottom": "env(safe-area-inset-bottom)",
            },
          },
        },
      };
    </script>

    <style>
      /* 2. GLOBAL OVERRIDES */
      #editor::-webkit-scrollbar {
        display: none;
      }
      .active-press:active {
        transform: scale(0.98);
        opacity: 0.8;
      }
    </style>
  </head>

  <body
    class="bg-brand-bg text-gray-200 h-screen flex flex-col overflow-hidden"
  >
    <header
      class="flex justify-between items-center px-4 py-3 border-b border-white/5 flex-none"
    >
      <h1
        class="text-[10px] font-black tracking-widest text-brand-accent uppercase"
      >
        Lab Phase 01
      </h1>
      <div
        id="status"
        class="text-[9px] text-gray-500 font-mono tracking-tighter"
      >
        IDLE
      </div>
    </header>

    <main class="flex-1 relative">
      <textarea
        id="editor"
        class="w-full h-full bg-transparent p-5 text-[16px] leading-relaxed outline-none resize-none placeholder:text-gray-800"
        placeholder="記錄觀察..."
      ></textarea>
    </main>

    <footer
      class="p-3 bg-brand-surface/30 border-t border-white/5 flex gap-2 flex-none pb-safe-bottom"
    >
      <button onclick="handleAction('time')" class="btn-primary flex-1">
        Time
      </button>
      <button onclick="handleAction('line')" class="btn-primary flex-1">
        Line
      </button>
      <button
        onclick="handleAction('clear')"
        class="btn-secondary px-4 text-red-900/60"
      >
        Clear
      </button>
    </footer>

    <script>
      const editor = document.getElementById("editor");
      const statusIcon = document.getElementById("status");

      // 初始化：讀取緩存
      editor.value = localStorage.getItem("lab_v1") || "";

      // 核心邏輯：自動存檔
      const saveContent = () => {
        localStorage.setItem("lab_v1", editor.value);
        statusIcon.innerText = "SAVED";
        statusIcon.classList.add("text-brand-accent");
        setTimeout(() => {
          statusIcon.innerText = "SYNCED";
          statusIcon.classList.remove("text-brand-accent");
        }, 800);
      };

      // 統一處理按鈕動作 (這就是你要求的延伸性：要加新功能只需在此擴充 case)
      function handleAction(type) {
        const start = editor.selectionStart;
        let insertStr = "";

        switch (type) {
          case "time":
            const now = new Date();
            insertStr = `\n[${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}] `;
            break;
          case "line":
            insertStr = "\n---\n";
            break;
          case "clear":
            if (confirm("Clear Lab?")) {
              editor.value = "";
              saveContent();
              return;
            }
            break;
        }

        if (insertStr) {
          editor.setRangeText(insertStr, start, editor.selectionEnd, "end");
          editor.focus();
          saveContent();
        }
      }

      editor.addEventListener("input", saveContent);
    </script>

    <style shadow>
      /* Utility Classes for cleaner HTML */
      .btn-primary {
        @apply py-3 bg-white/5 border border-white/5 rounded-xl text-[11px] font-bold uppercase tracking-wider active-press;
      }
      .btn-secondary {
        @apply py-3 bg-transparent border border-white/5 rounded-xl text-[11px] font-bold uppercase tracking-wider active-press;
      }
    </style>
  </body>
</html>
