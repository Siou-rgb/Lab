<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>LabX - Stable Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              labBg: "#0D0D0D",
              labAccent: "#BBF7D0",
              labRed: "#FF6B6B",
            },
            height: {
              screen: "100dvh", // 使用動態視窗高度
            },
          },
        },
      };
    </script>
    <style>
      /* 防止手機端自動放大輸入框 */
      input,
      textarea {
        font-size: 16px !important;
      }

      /* 隱藏捲軸 */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* 確保內容不被底部按鈕遮住 */
      .content-area {
        padding-bottom: 80px;
      }
    </style>
  </head>
  <body class="bg-labBg text-gray-200 h-screen flex flex-col overflow-hidden">
    <header
      class="flex justify-between items-center px-4 py-3 border-b border-white/5 flex-none z-20 bg-labBg"
    >
      <h1 class="text-xs font-black tracking-widest text-labAccent uppercase">
        LabX.
      </h1>
      <button
        onclick="toggleView()"
        class="text-[10px] text-gray-500 uppercase tracking-tighter"
        id="view-btn"
      >
        Past
      </button>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar relative content-area">
      <div id="editor-view" class="h-full">
        <textarea
          id="editor"
          class="w-full h-full bg-transparent p-5 leading-relaxed outline-none resize-none placeholder:text-gray-800"
          placeholder="Record..."
        ></textarea>
      </div>

      <div id="history-view" class="hidden p-5">
        <h2
          class="text-[10px] text-gray-600 mb-6 uppercase tracking-widest font-bold"
        >
          History Archive
        </h2>
        <div id="log-list" class="space-y-8"></div>
      </div>
    </main>

    <footer
      class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black via-black/90 to-transparent z-30"
    >
      <div
        class="max-w-md mx-auto flex items-center justify-between gap-2 bg-white/5 backdrop-blur-md p-1 rounded-2xl border border-white/10"
      >
        <div class="flex">
          <button
            onclick="handleAction('time')"
            class="px-3 py-2 text-[11px] text-gray-400 active:text-labAccent transition-colors"
          >
            time
          </button>
          <button
            onclick="handleAction('line')"
            class="px-3 py-2 text-[11px] text-gray-400 active:text-labAccent transition-colors"
          >
            line
          </button>
        </div>

        <button
          onclick="handleAction('save')"
          class="bg-labAccent text-black text-[11px] font-bold px-5 py-2 rounded-xl active:scale-95 transition-transform"
        >
          Save Log
        </button>

        <button
          onclick="handleAction('clear')"
          class="px-3 py-2 text-[11px] text-labRed/50 active:text-labRed"
        >
          clear
        </button>
      </div>
      <div class="h-[env(safe-area-inset-bottom)]"></div>
    </footer>

    <script>
      const editor = document.getElementById("editor");
      const editorView = document.getElementById("editor-view");
      const historyView = document.getElementById("history-view");
      const viewBtn = document.getElementById("view-btn");
      const logList = document.getElementById("log-list");

      let logs = JSON.parse(localStorage.getItem("lab_logs_v2") || "[]");

      function toggleView() {
        const isHistory = editorView.classList.contains("hidden");
        if (isHistory) {
          editorView.classList.remove("hidden");
          historyView.classList.add("hidden");
          viewBtn.innerText = "Past";
        } else {
          renderLogs();
          editorView.classList.add("hidden");
          historyView.classList.remove("hidden");
          viewBtn.innerText = "Back";
        }
      }

      function renderLogs() {
        logList.innerHTML =
          logs.length === 0
            ? '<div class="text-gray-800 text-xs">Empty archive.</div>'
            : "";
        logs
          .slice()
          .reverse()
          .forEach((log, i) => {
            const div = document.createElement("div");
            div.className = "group border-l-2 border-white/5 pl-4 py-1";
            div.innerHTML = `
                    <div class="text-[9px] text-labAccent/40 font-mono mb-2">${log.date}</div>
                    <div class="text-sm text-gray-300 leading-relaxed">${log.content.replace(/\n/g, "<br>")}</div>
                `;
            logList.appendChild(div);
          });
      }

      function handleAction(type) {
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}] `;

        if (type === "save") {
          if (!editor.value.trim()) return;
          logs.push({ date: now.toLocaleString(), content: editor.value });
          localStorage.setItem("lab_logs_v2", JSON.stringify(logs));
          editor.value = "";
          alert("Saved to Archive");
        } else if (type === "clear") {
          if (confirm("Clear Draft?")) editor.value = "";
        } else if (type === "time") {
          insertAtCursor(timeStr);
        } else if (type === "line") {
          insertAtCursor("\n---\n");
        }
      }

      function insertAtCursor(text) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value =
          editor.value.substring(0, start) + text + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + text.length;
        editor.focus();
      }
    </script>
  </body>
</html>
