<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>LabX - Top Toolbar Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              labBg: "#1C1616", // 依照截圖調整為深紅灰底色
              labAccent: "#BBF7D0",
              labRed: "#FF6B6B",
            },
          },
        },
      };
    </script>
    <style>
      textarea {
        font-size: 16px !important;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* 讓內容區填滿剩餘高度，確保不會超出螢幕 */
      body,
      html {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-labBg text-gray-400 flex flex-col h-full">
    <header class="flex justify-between items-center px-4 pt-4 pb-2 flex-none">
      <h1 class="text-lg font-medium tracking-tight text-labAccent">LAB.</h1>
      <button
        onclick="toggleView()"
        class="text-sm text-gray-500"
        id="view-btn"
      >
        past
      </button>
    </header>

    <nav class="px-4 py-1 flex-none">
      <div
        class="flex items-center justify-between border border-white/10 rounded-full px-1 py-1 bg-black/20"
      >
        <button
          onclick="handleAction('time')"
          class="flex-1 py-1.5 text-sm hover:text-white active:opacity-50 transition-all"
        >
          time
        </button>
        <div class="w-[1px] h-4 bg-white/10"></div>
        <button
          onclick="handleAction('line')"
          class="flex-1 py-1.5 text-sm hover:text-white active:opacity-50 transition-all"
        >
          line
        </button>
        <div class="w-[1px] h-4 bg-white/10"></div>
        <button
          onclick="handleAction('save')"
          class="flex-[1.5] py-1.5 text-sm hover:text-white active:opacity-50 transition-all text-gray-300"
        >
          save log
        </button>
        <div class="w-[1px] h-4 bg-white/10"></div>
        <button
          onclick="handleAction('clear')"
          class="flex-1 py-1.5 text-sm text-labRed/70 hover:text-labRed active:opacity-50 transition-all"
        >
          clear
        </button>
      </div>
    </nav>

    <main class="flex-1 overflow-hidden relative">
      <div id="editor-view" class="h-full">
        <textarea
          id="editor"
          class="w-full h-full bg-transparent p-5 text-gray-600 leading-relaxed outline-none resize-none placeholder:text-gray-800"
          placeholder="Record"
        ></textarea>
      </div>

      <div
        id="history-view"
        class="hidden h-full overflow-y-auto p-5 no-scrollbar"
      >
        <h2
          class="text-[10px] text-gray-600 mb-6 uppercase tracking-widest font-bold border-b border-white/5 pb-2"
        >
          Archive
        </h2>
        <div id="log-list" class="space-y-6 pb-20"></div>
      </div>
    </main>

    <script>
      const editor = document.getElementById("editor");
      const editorView = document.getElementById("editor-view");
      const historyView = document.getElementById("history-view");
      const viewBtn = document.getElementById("view-btn");
      const logList = document.getElementById("log-list");

      let logs = JSON.parse(localStorage.getItem("lab_logs_final") || "[]");

      function toggleView() {
        const isHistory = editorView.classList.contains("hidden");
        if (isHistory) {
          editorView.classList.remove("hidden");
          historyView.classList.add("hidden");
          viewBtn.innerText = "past";
        } else {
          renderLogs();
          editorView.classList.add("hidden");
          historyView.classList.remove("hidden");
          viewBtn.innerText = "back";
        }
      }

      function renderLogs() {
        logList.innerHTML =
          logs.length === 0
            ? '<div class="text-gray-800 text-xs text-center mt-10">Empty</div>'
            : "";
        logs
          .slice()
          .reverse()
          .forEach((log) => {
            const div = document.createElement("div");
            div.className = "border-l border-white/10 pl-4 py-1";
            div.innerHTML = `
                    <div class="text-[9px] text-labAccent/40 font-mono mb-2 uppercase">${log.date}</div>
                    <div class="text-sm text-gray-400 leading-relaxed">${log.content.replace(/\n/g, "<br>")}</div>
                `;
            logList.appendChild(div);
          });
      }

      function handleAction(type) {
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}] `;

        if (type === "save") {
          if (!editor.value.trim()) return;
          logs.push({
            date: now.toLocaleString("zh-TW", { hour12: false }),
            content: editor.value,
          });
          localStorage.setItem("lab_logs_final", JSON.stringify(logs));
          editor.value = "";
          alert("Saved");
        } else if (type === "clear") {
          if (confirm("Clear?")) editor.value = "";
        } else if (type === "time") {
          insertAtCursor(timeStr);
        } else if (type === "line") {
          insertAtCursor("\n---\n");
        }
      }

      function insertAtCursor(text) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value =
          editor.value.substring(0, start) + text + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + text.length;
        editor.focus();
      }
    </script>
  </body>
</html>
